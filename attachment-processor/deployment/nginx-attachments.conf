# =============================================================================
# Nginx 配置 — /api/attachments/ location
# =============================================================================
# 复制此段到服务器 Nginx 配置中（通常位于 /etc/nginx/sites-enabled/ 下）。
# 必须与现有的 /v1/chat/completions 鉴权逻辑共用同一套 session 校验。
# =============================================================================
#
# === 鉴权流程 ===
# 1. Nginx 校验 Authorization / x-api-key（与 /v1/chat/completions 相同逻辑）
# 2. 校验通过 → 添加 X-Nginx-Proxy "true" 头，透传 Authorization → proxy_pass 8091
# 3. 校验失败 → 直接返回 401
# 4. 8091 检查 X-Nginx-Proxy + Authorization 两个头都合法才放行
#
# === 部署前必须确认 ===
# - 下面 auth_request / 鉴权逻辑必须与服务器现有 /v1/ 鉴权方式一致
# - 如果现有鉴权走 Cloudflare Worker，此 location 也需要过 Worker
# - 如果现有鉴权是 Nginx auth_request / Lua / JWT 校验，此处复用
# =============================================================================

location /api/attachments/ {
    # ── 文件大小限制（与 8091 MAX_UPLOAD_MB 一致）──
    client_max_body_size 20m;

    # ── 超时（OCR 可能较慢）──
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # ── 鉴权：必须由 Nginx 层验证用户登录态 ──
    # 方式一（推荐）：复用现有的 auth_request 机制
    # auth_request /api/auth/verify;
    # auth_request_set $auth_status $upstream_status;
    
    # 方式二：透传 Authorization 头，让 8091 校验 Bearer token 格式
    # （8091 会校验 X-Nginx-Proxy + Authorization 两个头）
    # 如果现有系统用 x-api-key 鉴权，确保这里也透传：
    proxy_set_header Authorization $http_authorization;
    proxy_set_header x-api-key $http_x_api_key;

    # ── 来源标识：8091 只信任来自 Nginx 的请求 ──
    proxy_set_header X-Nginx-Proxy "true";

    # ── 标准代理头 ──
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── 后端 ──
    proxy_pass http://127.0.0.1:8091/api/attachments/;
    proxy_http_version 1.1;
}

# =============================================================================
# 安全说明
# =============================================================================
# - 8091 只监听 127.0.0.1:8091，公网无法直连
# - X-Nginx-Proxy 头由 Nginx 硬编码为 "true"，外部请求无法伪造
# - Authorization 头由 Nginx 层（auth_request / Worker）验证后再透传
# - 结果：只有已登录用户的合法请求才能通过 Nginx → 8091 链路
# =============================================================================
