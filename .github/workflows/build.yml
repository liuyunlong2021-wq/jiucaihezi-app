name: Build Desktop App
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install
      - name: Sync version from Git tag
        run: node scripts/set-version.mjs --auto
      - name: Download OpenCode (darwin arm64)
        run: node scripts/update-opencode-runtime.mjs --platform=darwin --arch=arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify binaries exist
        run: ls -lh src-tauri/binaries/

      - name: Frontend build (skip tests)
        run: pnpm exec vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "韭菜盒子 ${{ github.ref_name }}"
          releaseBody: |
            ## 韭菜盒子 ${{ github.ref_name }}

            ### macOS Apple Silicon (M 芯片)
            | 文件 | SHA256 |
            |------|--------|
            | 韭菜盒子_${{ github.ref_name }}_aarch64.dmg | 见 .sha256 文件 |

            ### 校验
            下载后请校验 SHA256：`shasum -a 256 -c 韭菜盒子_*.dmg.sha256`
          tauriScript: pnpm tauri
          args: --target aarch64-apple-darwin --config '{"build":{"beforeBuildCommand":""}}'

      - name: Notarize macOS app (ARM)
        if: env.APPLE_APP_PASSWORD != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          # 优化网络连接设置，增大 HTTP 超时阈值，解决 Apple notary 上传卡住和连接中断问题
          defaults write com.apple.gke.notary.tool nt-upload-connection-timeout 300
          
          for dmg in src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            echo "公证: $dmg"
            # 引入重试机制与明确的超时机制，防止单次长连接因网络瞬断导致整条流水线报错
            for i in {1..3}; do
              echo "开始提交公证（第 $i 次尝试）..."
              if xcrun notarytool submit "$dmg" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --timeout 30m \
                --wait; then
                echo "✅ 公证成功"
                break
              else
                echo "⚠️ 第 $i 次尝试失败，可能是网络抖动，等待 30 秒后重试..."
                if [ $i -eq 3 ]; then
                  echo "❌ 已达到最大重试次数，公证失败"
                  exit 1
                fi
                sleep 30
              fi
            done
            xcrun stapler staple "$dmg"
          done

      - name: Generate SHA256
        run: |
          for dmg in src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            shasum -a 256 "$dmg" > "${dmg}.sha256"
          done

      - name: Smoke test — sidecar verification (ARM)
        run: |
          DMG=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then echo "⚠️ 未找到 DMG，跳过 smoke test"; exit 0; fi
          hdiutil attach "$DMG" -quiet
          APP_PATH=$(find /Volumes -maxdepth 2 -name "*.app" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then echo "❌ 未找到 .app"; exit 1; fi
          echo "APP_PATH=$APP_PATH"
          echo "=== Sidecar 校验 ==="
          for bin in opencode; do
            BIN=$(find "$APP_PATH" -name "$bin" -type f 2>/dev/null | head -1)
            if [ -z "$BIN" ]; then echo "⚠️  $bin 未找到"; continue; fi
            SIZE=$(stat -f%z "$BIN" 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 2048 ]; then
              echo "❌ $bin 可能是占位脚本 (size=$SIZE)"
              exit 1
            fi
            echo "✅ $bin ($SIZE bytes)"
          done
          echo "=== 启动存活(15s) ==="
          MAIN_BIN=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Contents/Info.plist")
          "$APP_PATH/Contents/MacOS/$MAIN_BIN" & APP_PID=$!; sleep 15
          if kill -0 $APP_PID 2>/dev/null; then echo "✅ 存活"; kill $APP_PID; else echo "❌ 提前退出"; exit 1; fi
          hdiutil detach "$(echo "$APP_PATH" | sed -E 's#(/Volumes/[^/]+).*#\1#')" -quiet || true

      - name: Sign + upload to server (ARM)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BUNDLE="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          echo "Signing DMG for v$VERSION..."
          echo "$UPDATER_PRIVATE_KEY" > /tmp/ota-private.pem
          for dmg in "$BUNDLE"/*.dmg; do
            [ -f "$dmg" ] || continue
            openssl dgst -sha256 -sign /tmp/ota-private.pem -out "${dmg}.sig" "$dmg"
            echo "✅ signed: $(basename "$dmg")"
          done
          rm /tmp/ota-private.pem
          echo "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "mkdir -p /opt/updates/${VERSION}"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no "$BUNDLE"/*.dmg "$BUNDLE"/*.dmg.sig ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/updates/${VERSION}/
          rm /tmp/deploy_key
          echo "✅ uploaded"

  macos-intel:
    # 使用 macos-15-intel（原生 Intel x86_64）而非 macos-latest（ARM64），
    # 避免交叉编译 libsqlite3-sys / ring 等 C 依赖到 x86_64 的潜在问题。
    # GitHub 已公告 macos-13 退役；fallback: macos-13 或交叉编译 + 显式 SDKROOT。
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install

      - name: Sync version from Git tag
        run: node scripts/set-version.mjs --auto

      - name: Install Rust x86_64 target
        run: rustup target add x86_64-apple-darwin

      - name: Download OpenCode (darwin x64)
        run: node scripts/update-opencode-runtime.mjs --platform=darwin --arch=x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove ARM binaries (not needed for Intel build)
        run: rm -f src-tauri/binaries/*-aarch64-apple-darwin

      - name: Verify binaries exist
        run: ls -lh src-tauri/binaries/

      - name: Frontend build (skip tests)
        run: pnpm exec vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "韭菜盒子 ${{ github.ref_name }}"
          releaseBody: |
            ## 韭菜盒子 ${{ github.ref_name }}

            ### macOS Intel
            | 文件 | SHA256 |
            |------|--------|
            | 韭菜盒子_${{ github.ref_name }}_x64.dmg | 见 .sha256 文件 |

            ### 校验
            下载后请校验 SHA256：`shasum -a 256 -c 韭菜盒子_*.dmg.sha256`
          tauriScript: pnpm tauri
          args: --target x86_64-apple-darwin --config '{"build":{"beforeBuildCommand":""}}'

      - name: Notarize macOS app (Intel)
        if: env.APPLE_APP_PASSWORD != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          # 优化网络连接设置，增大 HTTP 超时阈值，解决 Apple notary 上传卡住和连接中断问题
          defaults write com.apple.gke.notary.tool nt-upload-connection-timeout 300
          
          for dmg in src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg; do
            echo "公证: $dmg"
            # 引入重试机制与明确的超时机制，防止单次长连接因网络瞬断导致整条流水线报错
            for i in {1..3}; do
              echo "开始提交公证（第 $i 次尝试）..."
              if xcrun notarytool submit "$dmg" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --timeout 30m \
                --wait; then
                echo "✅ 公证成功"
                break
              else
                echo "⚠️ 第 $i 次尝试失败，可能是网络抖动，等待 30 秒后重试..."
                if [ $i -eq 3 ]; then
                  echo "❌ 已达到最大重试次数，公证失败"
                  exit 1
                fi
                sleep 30
              fi
            done
            xcrun stapler staple "$dmg"
          done

      - name: Generate SHA256
        run: |
          for dmg in src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg; do
            shasum -a 256 "$dmg" > "${dmg}.sha256"
          done

      - name: Smoke test — sidecar verification (Intel)
        # ponytail: Intel DMG smoke test 对标 ARM job，验证 sidecar 二进制完整性和 APP 启动存活
        run: |
          DMG=$(ls src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then echo "⚠️ 未找到 DMG，跳过 smoke test"; exit 0; fi
          hdiutil attach "$DMG" -quiet
          APP_PATH=$(find /Volumes -maxdepth 2 -name "*.app" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then echo "❌ 未找到 .app"; exit 1; fi
          echo "APP_PATH=$APP_PATH"
          echo "=== Sidecar 校验 ==="
          for bin in opencode; do
            BIN=$(find "$APP_PATH" -name "$bin" -type f 2>/dev/null | head -1)
            if [ -z "$BIN" ]; then echo "⚠️  $bin 未找到"; continue; fi
            SIZE=$(stat -f%z "$BIN" 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 2048 ]; then
              echo "❌ $bin 可能是占位脚本 (size=$SIZE)"
              exit 1
            fi
            echo "✅ $bin ($SIZE bytes)"
          done
          echo "=== 架构校验 ==="
          MAIN_BIN=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Contents/Info.plist")
          file "$APP_PATH/Contents/MacOS/$MAIN_BIN"
          echo "=== 启动存活(15s) ==="
          "$APP_PATH/Contents/MacOS/$MAIN_BIN" & APP_PID=$!; sleep 15
          if kill -0 $APP_PID 2>/dev/null; then echo "✅ 存活"; kill $APP_PID; else echo "❌ 提前退出"; exit 1; fi
          hdiutil detach "$(echo "$APP_PATH" | sed -E 's#(/Volumes/[^/]+).*#\1#')" -quiet || true

      - name: Sign + upload to server (Intel)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BUNDLE="src-tauri/target/x86_64-apple-darwin/release/bundle/dmg"
          echo "$UPDATER_PRIVATE_KEY" > /tmp/ota-private.pem
          for dmg in "$BUNDLE"/*.dmg; do
            [ -f "$dmg" ] || continue
            openssl dgst -sha256 -sign /tmp/ota-private.pem -out "${dmg}.sig" "$dmg"
          done
          rm /tmp/ota-private.pem
          echo "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "mkdir -p /opt/updates/${VERSION}"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no "$BUNDLE"/*.dmg "$BUNDLE"/*.dmg.sig ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/updates/${VERSION}/
          rm /tmp/deploy_key

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install
      - name: Sync version from Git tag
        run: node scripts/set-version.mjs --auto
      - name: Download OpenCode (windows x64)
        run: node scripts/update-opencode-runtime.mjs --platform=win32 --arch=x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove macOS binaries (not needed for Windows build)
        shell: bash
        run: rm -f src-tauri/binaries/*-apple-darwin

      - name: Verify binaries exist
        shell: bash
        run: ls -lh src-tauri/binaries/

      - name: Frontend build (skip tests)
        run: pnpm exec vue-tsc -b && pnpm exec vite build

      - name: Build Windows app (portable)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          '{"build":{"beforeBuildCommand":""}}' | Set-Content -Encoding UTF8 tauri.windows.ci.conf.json
          pnpm tauri build --target x86_64-pc-windows-msvc --no-bundle --config tauri.windows.ci.conf.json

      - name: Package Windows portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = "src-tauri\target\x86_64-pc-windows-msvc\release"
          $portableRoot = "src-tauri\target\windows-portable"
          $portableDir = Join-Path $portableRoot "韭菜盒子"
          $zipPath = "src-tauri\target\韭菜盒子_${env:GITHUB_REF_NAME}_x64_windows_portable.zip"

          if (Test-Path $portableRoot) {
            Remove-Item $portableRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force $portableDir | Out-Null

          Copy-Item "$releaseDir\jiucaihezi-app.exe" (Join-Path $portableDir "韭菜盒子.exe")
          Copy-Item "src-tauri\binaries\*.exe" $portableDir
          if (Test-Path "src-tauri\binaries\opencode-runtime.json") {
            Copy-Item "src-tauri\binaries\opencode-runtime.json" $portableDir
          }

          # 生成 README.txt（Windows 用户解压后可见）
          $readme = @"
          韭菜盒子 — Windows 便携版
          ============================

          使用前必读：

          1. 请先解压整个 zip 包到一个文件夹（不要直接在 zip 里双击运行！）

          2. 韭菜盒子需要 Microsoft Edge WebView2 Runtime。
             如果打开时提示缺少 WebView2，请下载安装：
             https://go.microsoft.com/fwlink/p/?LinkId=2124703
             （Windows 11 通常已自带；Windows 10 可能需要手动安装）

          3. 如果启动后卡在 logo 画面：
             - 确保所有 exe 文件都在同一目录下
             - 尝试以管理员身份运行
             - 检查杀毒软件是否拦截了 opencode.exe

          4. 数据存储位置：%APPDATA%\com.jiucaihezi.desktop\

          问题反馈：https://github.com/liuyunlong2021-wq/jiucaihezi-app/issues
          "@
          $readme | Out-File -Encoding UTF8 (Join-Path $portableDir "README.txt")

          Compress-Archive -Path $portableDir -DestinationPath $zipPath -Force
          Get-Item $zipPath | Format-List FullName,Length

      - name: Smoke test — Windows portable zip contents
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = "src-tauri\target\韭菜盒子_${env:GITHUB_REF_NAME}_x64_windows_portable.zip"
          if (-not (Test-Path $zipPath)) {
            Write-Host "⚠️ 未找到 zip，跳过 smoke test"
            exit 0
          }
          Write-Host "=== ZIP 内容校验 ==="
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          $names = $zip.Entries | ForEach-Object { $_.Name }
          $zip.Dispose()
          $required = @("韭菜盒子.exe", "opencode-x86_64-pc-windows-msvc.exe", "README.txt")
          foreach ($name in $required) {
            if ($name -in $names) {
              Write-Host "✅ $name"
            } else {
              Write-Host "❌ 缺失: $name"
              exit 1
            }
          }
          $sizeMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)
          Write-Host "✅ ZIP 大小: ${sizeMB}MB, 文件数: $($names.Count)"

      - name: Upload Windows portable zip
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${env:GITHUB_REF_NAME}"
          $zipPath = "src-tauri\target\韭菜盒子_${tag}_x64_windows_portable.zip"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Desktop builds"
          }
          gh release upload $tag $zipPath --clobber

      - name: Upload Windows zip to server
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "mkdir -p /opt/updates/${VERSION}"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no src-tauri/target/韭菜盒子_*_x64_windows_portable.zip ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/updates/${VERSION}/
          rm /tmp/deploy_key

  publish-manifest:
    needs: [macos-arm, macos-intel, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Generate and upload latest.json
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # 在服务器端生成 latest.json + 清理旧版本
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "bash -s" << 'REMOTE_SCRIPT'
          set -e
          cd /opt/updates
          V=$(ls -d */ 2>/dev/null | sort -V | tail -1 | tr -d '/')
          if [ -z "$V" ]; then echo "No versions found"; exit 1; fi
          ARM_DMG=$(ls $V/*aarch64.dmg 2>/dev/null | head -1)
          INTEL_DMG=$(ls $V/*x64.dmg 2>/dev/null | grep -v aarch64 | head -1)
          ARM_SIG=$(cat "$V/$(basename "$ARM_DMG" .dmg).dmg.sig" 2>/dev/null | base64 -w0 || echo '')
          INTEL_SIG=$(cat "$V/$(basename "$INTEL_DMG" .dmg).dmg.sig" 2>/dev/null | base64 -w0 || echo '')
          cat > /opt/updates/latest.json << EOF
          {
            "version": "$V",
            "notes": "更新内容见 GitHub Releases",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$ARM_SIG",
                "url": "https://api.jiucaihezi.studio/updates/$V/$(basename "$ARM_DMG")"
              },
              "darwin-x86_64": {
                "signature": "$INTEL_SIG",
                "url": "https://api.jiucaihezi.studio/updates/$V/$(basename "$INTEL_DMG")"
              }
            }
          }
          EOF
          echo "latest.json generated for v$V"
          # 清理旧版本（保留最新 5 版）
          ls -d */ 2>/dev/null | sort -V | head -n -5 | xargs rm -rf
          REMOTE_SCRIPT
          rm /tmp/deploy_key
