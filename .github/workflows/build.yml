name: Build Desktop App
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install

      - name: Download OpenCode (darwin arm64)
        run: node scripts/update-opencode-runtime.mjs --platform=darwin --arch=arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download yt-dlp (darwin arm64)
        run: |
          curl -fSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" \
            -o src-tauri/binaries/yt-dlp-aarch64-apple-darwin
          chmod +x src-tauri/binaries/yt-dlp-aarch64-apple-darwin

      - name: Download ffmpeg + ffprobe (darwin arm64)
        run: |
          brew install --quiet ffmpeg 2>/dev/null || true
          cp "$(which ffmpeg)" src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          cp "$(which ffprobe)" src-tauri/binaries/ffprobe-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffprobe-aarch64-apple-darwin

      - name: Prepare whisper-cli placeholder (darwin arm64)
        run: |
          printf '#!/bin/sh\necho "whisper-cli not bundled; install separately"\nexit 1\n' \
            > src-tauri/binaries/whisper-cli-aarch64-apple-darwin
          chmod +x src-tauri/binaries/whisper-cli-aarch64-apple-darwin

      - name: Verify binaries exist
        run: ls -lh src-tauri/binaries/

      - name: Frontend build (skip tests)
        run: pnpm exec vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'macOS Apple Silicon build'
          tauriScript: pnpm tauri
          args: --target aarch64-apple-darwin --config '{"build":{"beforeBuildCommand":""}}'

  macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install

      - name: Install Rust x86_64 target
        run: rustup target add x86_64-apple-darwin

      - name: Download OpenCode (darwin x64)
        run: node scripts/update-opencode-runtime.mjs --platform=darwin --arch=x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download yt-dlp (darwin x64)
        run: |
          curl -fSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" \
            -o src-tauri/binaries/yt-dlp-x86_64-apple-darwin
          chmod +x src-tauri/binaries/yt-dlp-x86_64-apple-darwin

      - name: Download ffmpeg + ffprobe (darwin x64)
        run: |
          brew install --quiet ffmpeg 2>/dev/null || true
          cp "$(which ffmpeg)" src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          cp "$(which ffprobe)" src-tauri/binaries/ffprobe-x86_64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          chmod +x src-tauri/binaries/ffprobe-x86_64-apple-darwin

      - name: Prepare whisper-cli placeholder (darwin x64)
        run: |
          printf '#!/bin/sh\necho "whisper-cli not bundled; install separately"\nexit 1\n' \
            > src-tauri/binaries/whisper-cli-x86_64-apple-darwin
          chmod +x src-tauri/binaries/whisper-cli-x86_64-apple-darwin

      - name: Remove ARM binaries (not needed for Intel build)
        run: rm -f src-tauri/binaries/*-aarch64-apple-darwin

      - name: Verify binaries exist
        run: ls -lh src-tauri/binaries/

      - name: Frontend build (skip tests)
        run: pnpm exec vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'macOS Intel build'
          tauriScript: pnpm tauri
          args: --target x86_64-apple-darwin --config '{"build":{"beforeBuildCommand":""}}'

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install

      - name: Download OpenCode (windows x64)
        run: node scripts/update-opencode-runtime.mjs --platform=win32 --arch=x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download yt-dlp (windows x64)
        shell: bash
        run: |
          curl -fSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" \
            -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe

      - name: Download ffmpeg + ffprobe (windows x64)
        shell: bash
        run: |
          curl -fSL "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" \
            -o /tmp/ffmpeg.zip
          unzip -q /tmp/ffmpeg.zip -d /tmp/ffmpeg
          FFMPEG_DIR=$(find /tmp/ffmpeg -name "ffmpeg.exe" -path "*/bin/*" | head -1 | xargs dirname)
          cp "$FFMPEG_DIR/ffmpeg.exe" src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          cp "$FFMPEG_DIR/ffprobe.exe" src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - name: Prepare whisper-cli placeholder (windows x64)
        shell: bash
        run: |
          echo "whisper-cli not bundled" > src-tauri/binaries/whisper-cli-x86_64-pc-windows-msvc.exe

      - name: Remove macOS binaries (not needed for Windows build)
        shell: bash
        run: rm -f src-tauri/binaries/*-apple-darwin

      - name: Verify binaries exist
        shell: bash
        run: ls -lh src-tauri/binaries/

      - name: Frontend build (skip tests)
        run: pnpm exec vue-tsc -b && pnpm exec vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'Windows x64 build'
          tauriScript: pnpm tauri
          args: --target x86_64-pc-windows-msvc --config '{"build":{"beforeBuildCommand":""}}'
