name: Build Desktop App
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install

      - name: Download OpenCode (darwin arm64)
        run: node scripts/update-opencode-runtime.mjs --platform=darwin --arch=arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download yt-dlp (darwin arm64)
        run: |
          curl -fSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" \
            -o src-tauri/binaries/yt-dlp-aarch64-apple-darwin
          chmod +x src-tauri/binaries/yt-dlp-aarch64-apple-darwin

      - name: Download ffmpeg + ffprobe (darwin arm64, static)
        run: |
          FFMPEG_URL="https://evermeet.cx/ffmpeg/ffmpeg-8.0.1.zip"
          FFPROBE_URL="https://evermeet.cx/ffmpeg/ffprobe-8.0.1.zip"
          curl -fSL "$FFMPEG_URL" -o /tmp/ffmpeg.zip
          curl -fSL "$FFPROBE_URL" -o /tmp/ffprobe.zip
          unzip -q /tmp/ffmpeg.zip -d /tmp/ffmpeg_dir
          unzip -q /tmp/ffprobe.zip -d /tmp/ffprobe_dir
          cp /tmp/ffmpeg_dir/ffmpeg src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          cp /tmp/ffprobe_dir/ffprobe src-tauri/binaries/ffprobe-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffprobe-aarch64-apple-darwin

          echo "=== 架构校验 ==="
          for bin in ffmpeg-aarch64-apple-darwin ffprobe-aarch64-apple-darwin; do
            ARCH=$(file "src-tauri/binaries/$bin" | grep -oE 'arm64|x86_64')
            echo "✅ $bin: $ARCH"
          done

      - name: Prepare whisper-cli placeholder (darwin arm64)
        run: |
          printf '#!/bin/sh\necho "whisper-cli not bundled; install separately"\nexit 1\n' \
            > src-tauri/binaries/whisper-cli-aarch64-apple-darwin
          chmod +x src-tauri/binaries/whisper-cli-aarch64-apple-darwin

      - name: Verify binaries exist
        run: ls -lh src-tauri/binaries/

      - name: Frontend build (skip tests)
        run: pnpm exec vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "韭菜盒子 ${{ github.ref_name }}"
          releaseBody: |
            ## 韭菜盒子 ${{ github.ref_name }}

            ### macOS Apple Silicon (M 芯片)
            | 文件 | SHA256 |
            |------|--------|
            | 韭菜盒子_${{ github.ref_name }}_aarch64.dmg | 见 .sha256 文件 |

            ### 校验
            下载后请校验 SHA256：`shasum -a 256 -c 韭菜盒子_*.dmg.sha256`
          tauriScript: pnpm tauri
          args: --target aarch64-apple-darwin --config '{"build":{"beforeBuildCommand":""}}'

      - name: Notarize macOS app (ARM)
        if: env.APPLE_APP_PASSWORD != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          for dmg in src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            echo "公证: $dmg"
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: Generate SHA256
        run: |
          for dmg in src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            shasum -a 256 "$dmg" > "${dmg}.sha256"
          done

      - name: Smoke test — sidecar verification (ARM)
        run: |
          DMG=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then echo "⚠️ 未找到 DMG，跳过 smoke test"; exit 0; fi
          hdiutil attach "$DMG" -quiet
          APP_PATH=$(find /Volumes -maxdepth 2 -name "*.app" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then echo "❌ 未找到 .app"; exit 1; fi
          echo "APP_PATH=$APP_PATH"
          echo "=== Sidecar 校验 ==="
          for bin in opencode ffmpeg ffprobe yt-dlp; do
            BIN=$(find "$APP_PATH" -name "$bin" -type f 2>/dev/null | head -1)
            if [ -z "$BIN" ]; then echo "⚠️  $bin 未找到"; continue; fi
            SIZE=$(stat -f%z "$BIN" 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 2048 ]; then
              echo "❌ $bin 可能是占位脚本 (size=$SIZE)"
              exit 1
            fi
            echo "✅ $bin ($SIZE bytes)"
          done
          echo "=== 启动存活(15s) ==="
          MAIN_BIN=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Contents/Info.plist")
          "$APP_PATH/Contents/MacOS/$MAIN_BIN" & APP_PID=$!; sleep 15
          if kill -0 $APP_PID 2>/dev/null; then echo "✅ 存活"; kill $APP_PID; else echo "❌ 提前退出"; exit 1; fi
          hdiutil detach "$(echo "$APP_PATH" | sed -E 's#(/Volumes/[^/]+).*#\1#')" -quiet || true

  macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install

      - name: Install Rust x86_64 target
        run: rustup target add x86_64-apple-darwin

      - name: Download OpenCode (darwin x64)
        run: node scripts/update-opencode-runtime.mjs --platform=darwin --arch=x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download yt-dlp (darwin x64)
        run: |
          curl -fSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" \
            -o src-tauri/binaries/yt-dlp-x86_64-apple-darwin
          chmod +x src-tauri/binaries/yt-dlp-x86_64-apple-darwin

      - name: Download ffmpeg + ffprobe (darwin x64, static)
        run: |
          FFMPEG_URL="https://evermeet.cx/ffmpeg/ffmpeg-8.0.1.zip"
          FFPROBE_URL="https://evermeet.cx/ffmpeg/ffprobe-8.0.1.zip"
          curl -fSL "$FFMPEG_URL" -o /tmp/ffmpeg.zip
          curl -fSL "$FFPROBE_URL" -o /tmp/ffprobe.zip
          unzip -q /tmp/ffmpeg.zip -d /tmp/ffmpeg_dir
          unzip -q /tmp/ffprobe.zip -d /tmp/ffprobe_dir
          cp /tmp/ffmpeg_dir/ffmpeg src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          cp /tmp/ffprobe_dir/ffprobe src-tauri/binaries/ffprobe-x86_64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          chmod +x src-tauri/binaries/ffprobe-x86_64-apple-darwin

          echo "=== 架构校验（evermeet universal binary） ==="
          for bin in ffmpeg-x86_64-apple-darwin ffprobe-x86_64-apple-darwin; do
            ARCH=$(file "src-tauri/binaries/$bin" | grep -oE 'x86_64|arm64')
            if [ -z "$ARCH" ]; then
              echo "❌ $bin 无法识别架构"
              exit 1
            fi
            echo "✅ $bin: $ARCH"
          done

      - name: Prepare whisper-cli placeholder (darwin x64)
        run: |
          printf '#!/bin/sh\necho "whisper-cli not bundled; install separately"\nexit 1\n' \
            > src-tauri/binaries/whisper-cli-x86_64-apple-darwin
          chmod +x src-tauri/binaries/whisper-cli-x86_64-apple-darwin

      - name: Remove ARM binaries (not needed for Intel build)
        run: rm -f src-tauri/binaries/*-aarch64-apple-darwin

      - name: Verify binaries exist
        run: ls -lh src-tauri/binaries/

      - name: Frontend build (skip tests)
        run: pnpm exec vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "韭菜盒子 ${{ github.ref_name }}"
          releaseBody: |
            ## 韭菜盒子 ${{ github.ref_name }}

            ### macOS Intel
            | 文件 | SHA256 |
            |------|--------|
            | 韭菜盒子_${{ github.ref_name }}_x64.dmg | 见 .sha256 文件 |

            ### 校验
            下载后请校验 SHA256：`shasum -a 256 -c 韭菜盒子_*.dmg.sha256`
          tauriScript: pnpm tauri
          args: --target x86_64-apple-darwin --config '{"build":{"beforeBuildCommand":""}}'

      - name: Notarize macOS app (Intel)
        if: env.APPLE_APP_PASSWORD != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          for dmg in src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg; do
            echo "公证: $dmg"
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: Generate SHA256
        run: |
          for dmg in src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg; do
            shasum -a 256 "$dmg" > "${dmg}.sha256"
          done

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install

      - name: Download OpenCode (windows x64)
        run: node scripts/update-opencode-runtime.mjs --platform=win32 --arch=x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download yt-dlp (windows x64)
        shell: bash
        run: |
          curl -fSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" \
            -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe

      - name: Download ffmpeg + ffprobe (windows x64)
        shell: bash
        run: |
          curl -fSL "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" \
            -o /tmp/ffmpeg.zip
          unzip -q /tmp/ffmpeg.zip -d /tmp/ffmpeg
          FFMPEG_DIR=$(find /tmp/ffmpeg -name "ffmpeg.exe" -path "*/bin/*" | head -1 | xargs dirname)
          cp "$FFMPEG_DIR/ffmpeg.exe" src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          cp "$FFMPEG_DIR/ffprobe.exe" src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - name: Prepare whisper-cli placeholder (windows x64)
        shell: bash
        run: |
          cat > /tmp/whisper-cli-placeholder.rs <<'EOF'
          fn main() {
              eprintln!("whisper-cli not bundled; install separately");
              std::process::exit(1);
          }
          EOF
          rustc /tmp/whisper-cli-placeholder.rs -O -o src-tauri/binaries/whisper-cli-x86_64-pc-windows-msvc.exe

      - name: Remove macOS binaries (not needed for Windows build)
        shell: bash
        run: rm -f src-tauri/binaries/*-apple-darwin

      - name: Verify binaries exist
        shell: bash
        run: ls -lh src-tauri/binaries/

      - name: Frontend build (skip tests)
        run: pnpm exec vue-tsc -b && pnpm exec vite build

      - name: Build Windows app (portable)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          '{"build":{"beforeBuildCommand":""}}' | Set-Content -Encoding UTF8 tauri.windows.ci.conf.json
          pnpm tauri build --target x86_64-pc-windows-msvc --no-bundle --config tauri.windows.ci.conf.json

      - name: Package Windows portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = "src-tauri\target\x86_64-pc-windows-msvc\release"
          $portableRoot = "src-tauri\target\windows-portable"
          $portableDir = Join-Path $portableRoot "韭菜盒子"
          $zipPath = "src-tauri\target\韭菜盒子_${env:GITHUB_REF_NAME}_x64_windows_portable.zip"

          if (Test-Path $portableRoot) {
            Remove-Item $portableRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force $portableDir | Out-Null

          Copy-Item "$releaseDir\jiucaihezi-app.exe" (Join-Path $portableDir "韭菜盒子.exe")
          Copy-Item "src-tauri\binaries\*.exe" $portableDir
          if (Test-Path "src-tauri\binaries\opencode-runtime.json") {
            Copy-Item "src-tauri\binaries\opencode-runtime.json" $portableDir
          }

          Compress-Archive -Path $portableDir -DestinationPath $zipPath -Force
          Get-Item $zipPath | Format-List FullName,Length

      - name: Upload Windows portable zip
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${env:GITHUB_REF_NAME}"
          $zipPath = "src-tauri\target\韭菜盒子_${tag}_x64_windows_portable.zip"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Desktop builds"
          }
          gh release upload $tag $zipPath --clobber
