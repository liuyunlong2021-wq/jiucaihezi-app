<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提示词参考 — GPT Image 2 画廊</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #fafaf9;
    --surface: #fff;
    --ink1: #1c1917;
    --ink2: #57534e;
    --ink3: #a8a29e;
    --border: #e7e5e4;
    --accent: #4d7c0f;
    --accent-bg: #ecfccb;
    --search-bg: #f5f5f4;
    --highlight: #fef08a;
    --code-bg: #f5f5f4;
    --img-border: #e7e5e4;
    --tag-bg: #f0fdf4;
    --tag-ink: #166534;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--ink1);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--ink1);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-header h1 .icon { font-size: 18px; }
  .search-box {
    margin: 12px 16px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--search-bg);
    color: var(--ink1);
    outline: none;
    transition: border-color .15s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink3);
    font-size: 14px;
  }
  .search-results-count {
    padding: 2px 16px 8px;
    font-size: 11px;
    color: var(--ink3);
    display: none;
  }
  .search-results-count.show { display: block; }
  .cat-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 16px;
  }
  .cat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--ink2);
    transition: background .1s;
    user-select: none;
  }
  .cat-item:hover { background: var(--search-bg); }
  .cat-item.active {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 600;
  }
  .cat-item .emoji { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
  .cat-item .count {
    margin-left: auto;
    font-size: 11px;
    color: var(--ink3);
    background: var(--search-bg);
    padding: 1px 6px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .cat-item.hidden { display: none; }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .main-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .main-header h2 {
    font-size: 18px;
    font-weight: 700;
  }
  .main-header .meta {
    font-size: 12px;
    color: var(--ink3);
  }
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--ink3);
    text-align: center;
    gap: 8px;
  }
  .welcome .big-icon { font-size: 48px; }
  .welcome h3 { font-size: 16px; color: var(--ink2); }
  .welcome p { font-size: 13px; max-width: 320px; line-height: 1.6; }

  /* Markdown content */
  .md-content { max-width: 820px; }
  .md-content h2 { font-size: 20px; margin: 28px 0 12px; color: var(--ink1); }
  .md-content h3 { font-size: 16px; margin: 22px 0 8px; color: var(--ink1); }
  .md-content p { font-size: 14px; line-height: 1.7; color: var(--ink2); margin: 8px 0; }
  .md-content code {
    background: var(--code-bg);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  }
  .md-content pre {
    background: var(--code-bg);
    padding: 14px 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 10px 0;
    border: 1px solid var(--border);
  }
  .md-content pre code {
    background: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.6;
  }
  .md-content img {
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid var(--img-border);
    margin: 8px 0;
  }
  .md-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 14px;
    margin: 10px 0;
    color: var(--ink3);
    font-size: 13px;
  }
  .md-content ul, .md-content ol { padding-left: 20px; margin: 8px 0; }
  .md-content li { font-size: 14px; line-height: 1.7; color: var(--ink2); }
  .md-content a { color: var(--accent); }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .md-content table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
  .md-content th, .md-content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .md-content th { background: var(--search-bg); font-weight: 600; }

  /* Highlight search matches */
  mark { background: var(--highlight); padding: 0 2px; border-radius: 2px; }
  .no-match { display: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink3); }

  @media (max-width: 700px) {
    .sidebar { width: 100%; min-width: 0; position: absolute; z-index: 10; height: 100%; }
    .sidebar.collapsed { display: none; }
    .main-header { padding-left: 50px; }
    .menu-toggle {
      display: flex !important;
      position: absolute;
      left: 8px;
      top: 12px;
    }
  }
  .menu-toggle {
    display: none;
    width: 32px; height: 32px;
    align-items: center; justify-content: center;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface); cursor: pointer;
    font-size: 16px;
  }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1><span class="icon">🎨</span>GPT Image 2 画廊</h1>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索提示词、风格、类别..." autocomplete="off">
  </div>
  <div class="search-results-count" id="searchCount"></div>
  <div class="cat-list" id="catList"></div>
</aside>

<main class="main">
  <div class="main-header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <h2 id="mainTitle">提示词参考</h2>
    <span class="meta" id="mainMeta"></span>
  </div>
  <div class="content-area" id="contentArea">
    <div class="welcome">
      <div class="big-icon">💡</div>
      <h3>选择左侧分类浏览提示词</h3>
      <p>覆盖 37 个风格类别、168+ 条可复制提示词。支持搜索和分类筛选。</p>
    </div>
  </div>
</main>

<script>
const BASE = '/skills/JC-GPT-Image2-Skill/gpt-image/references/'
const SKILL_ROOT = '/skills/JC-GPT-Image2-Skill/'
const INDEX_FILE = BASE + 'gallery.md'

let categories = []
let activeFile = null
let allContentCache = {} // file -> rendered HTML text (for search)

// Parse gallery.md index table
async function loadIndex() {
  const resp = await fetch(INDEX_FILE)
  const text = await resp.text()
  // Parse the table rows
  const lines = text.split('\n')
  for (const line of lines) {
    const m = line.match(/^\|\s*(.+?)\s*\|\s*\[`(.+?)`\]\((.+?)\)\s*\|\s*(.+?)\s*\|\s*(\d+)\s*\|/)
    if (m) {
      const emojiAndName = m[1].trim()
      const file = m[3].trim()
      const count = parseInt(m[5])
      // Extract emoji and name
      const emojiMatch = emojiAndName.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F?)\s+(.+)/u)
      const emoji = emojiMatch ? emojiMatch[1] : '📄'
      const name = emojiMatch ? emojiMatch[2] : emojiAndName
      categories.push({ emoji, name, file, count, el: null })
    }
  }
  renderCatList()
}

function renderCatList(filter) {
  const list = document.getElementById('catList')
  const q = (filter || '').toLowerCase().trim()
  let visible = 0

  list.innerHTML = ''
  for (const cat of categories) {
    const matches = !q || cat.name.toLowerCase().includes(q) || cat.file.toLowerCase().includes(q)
    const div = document.createElement('div')
    div.className = 'cat-item' + (matches ? '' : ' hidden')
    div.innerHTML = `<span class="emoji">${cat.emoji}</span>${cat.name}<span class="count">${cat.count}</span>`
    div.onclick = () => loadCategory(cat, div)
    list.appendChild(div)
    cat.el = div
    if (matches) visible++
  }

  const countEl = document.getElementById('searchCount')
  if (q) {
    countEl.textContent = `找到 ${visible} 个分类`
    countEl.classList.add('show')
  } else {
    countEl.classList.remove('show')
  }
}

async function loadCategory(cat, el) {
  // Mark active
  document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'))
  el.classList.add('active')
  activeFile = cat.file

  document.getElementById('mainTitle').textContent = cat.emoji + ' ' + cat.name
  document.getElementById('mainMeta').textContent = `${cat.count} 条提示词`

  const contentArea = document.getElementById('contentArea')

  // Check cache
  if (allContentCache[cat.file]) {
    contentArea.innerHTML = '<div class="md-content">' + allContentCache[cat.file] + '</div>'
    return
  }

  contentArea.innerHTML = '<div class="welcome"><p>加载中...</p></div>'

  try {
    const resp = await fetch(BASE + cat.file)
    let text = await resp.text()
    // Rewrite relative image paths to absolute (../../../docs/... → /skills/JC-GPT-Image2-Skill/docs/...)
    text = text.replace(/src="(\.\.\/)+/g, 'src="' + SKILL_ROOT)
    const html = marked.parse(text)
    allContentCache[cat.file] = html
    contentArea.innerHTML = '<div class="md-content">' + html + '</div>'
  } catch (e) {
    contentArea.innerHTML = '<div class="welcome"><p style="color:#dc2626">加载失败: ' + e.message + '</p></div>'
  }
}

// Search across all loaded content
let searchTimeout
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim()
  clearTimeout(searchTimeout)

  // Filter category list
  renderCatList(q)

  if (!q) {
    // Clear content highlights
    const contentArea = document.getElementById('contentArea')
    const marks = contentArea.querySelectorAll('mark')
    marks.forEach(m => {
      const parent = m.parentNode
      parent.replaceChild(document.createTextNode(m.textContent), m)
    })
    return
  }

  // If we have loaded content, highlight matches
  searchTimeout = setTimeout(() => {
    highlightInContent(q)
  }, 300)
})

function highlightInContent(q) {
  const contentArea = document.getElementById('contentArea')
  const mdContent = contentArea.querySelector('.md-content')
  if (!mdContent) return

  // Remove old highlights
  const marks = mdContent.querySelectorAll('mark')
  marks.forEach(m => {
    const parent = m.parentNode
    parent.replaceChild(document.createTextNode(m.textContent), m)
  })

  // Highlight in text nodes
  const walker = document.createTreeWalker(mdContent, NodeFilter.SHOW_TEXT, null, false)
  const textNodes = []
  while (walker.nextNode()) textNodes.push(walker.currentNode)

  const regex = new RegExp(`(${escapeRegex(q)})`, 'gi')
  for (const node of textNodes) {
    const parent = node.parentNode
    if (parent.tagName === 'MARK' || parent.tagName === 'CODE' || parent.tagName === 'PRE') continue
    const newHtml = node.textContent.replace(regex, '<mark>$1</mark>')
    if (newHtml !== node.textContent) {
      const span = document.createElement('span')
      span.innerHTML = newHtml
      parent.replaceChild(span, node)
    }
  }
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') }

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed')
}

// Init
loadIndex()
</script>
</body>
</html>
