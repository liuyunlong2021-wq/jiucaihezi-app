<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- ═══ Crown ═══ -->
  <!-- Crown body: 3 peaked arches (wider than leaves) -->
  <path d="M15 16 L21 5.5 L26.5 13.5 L32 2 L37.5 13.5 L43 5.5 L49 16"
        stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crown base band -->
  <line x1="15" y1="16" x2="49" y2="16"
        stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
  <!-- Crown gems at peaks -->
  <circle cx="21" cy="4.5" r="1.8" fill="#C9A84C"/>
  <circle cx="32" cy="1" r="2" fill="#C9A84C"/>
  <circle cx="43" cy="4.5" r="1.8" fill="#C9A84C"/>

  <!-- ═══ Original Jiucaihua (韭菜花) ═══ -->
  <!-- Wavy base -->
  <path d="M19 49C21.6 46.4 25.1 46.4 27.7 49C29.8 51.1 33.2 51.1 35.3 49C37.9 46.4 41.4 46.4 44 49"
        stroke="#A89B5F" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stem -->
  <path d="M32 46V28"
        stroke="#A89B5F" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M32 28C30.2 21.1 24.5 17.3 18 18.4C18.4 24.7 23.2 29.8 29.5 30.2"
        stroke="#A89B5F" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right leaf -->
  <path d="M32 28C33.8 21.1 39.5 17.3 46 18.4C45.6 24.7 40.8 29.8 34.5 30.2"
        stroke="#A89B5F" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
