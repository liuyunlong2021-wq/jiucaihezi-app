name = "jiucaihezi-gateway"
main = "src/index.js"
compatibility_date = "2026-06-02"
workers_dev = false
preview_urls = false

routes = [
  { pattern = "api.jiucaihezi.studio/", zone_name = "jiucaihezi.studio" },
  { pattern = "api.jiucaihezi.studio/favicon.svg", zone_name = "jiucaihezi.studio" },
  { pattern = "api.jiucaihezi.studio/favicon.ico", zone_name = "jiucaihezi.studio" },
  { pattern = "api.jiucaihezi.studio/apple-touch-icon.svg", zone_name = "jiucaihezi.studio" },
  { pattern = "api.jiucaihezi.studio/apple-touch-icon.png", zone_name = "jiucaihezi.studio" },
  { pattern = "api.jiucaihezi.studio/auth/*", zone_name = "jiucaihezi.studio" },
  { pattern = "api.jiucaihezi.studio/health", zone_name = "jiucaihezi.studio" },
  { pattern = "api.jiucaihezi.studio/landing/*", zone_name = "jiucaihezi.studio" }
]

[vars]
NEWAPI_BASE_URL = "https://api.jiucaihezi.studio"
NEWAPI_DEFAULT_GROUP = "auto"
LANDING_ASSET_BASE_URL = "https://jiucaihezi.studio/landing"

[[kv_namespaces]]
binding = "PLUGIN_KV"
id = "b32af0b054b14548a81a1c77717c1299"

[[d1_databases]]
binding = "DB"
database_name = "jiucaihezi_gateway"
database_id = "e91b223c-6a4d-4df3-8872-6e35072f3fcf"
